version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: defense_wiz
      POSTGRES_USER: defense_user
      POSTGRES_PASSWORD: defense_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: